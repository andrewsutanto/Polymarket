name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest

      - name: Lint with ruff
        run: ruff check . --output-format=github

      - name: Type check with mypy (best effort)
        run: mypy --ignore-missing-imports --no-error-summary bot.py main.py core/ || true

      - name: Run tests
        run: pytest tests/ backtesting/tests/ -v --tb=short || true
